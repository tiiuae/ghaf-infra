name: Update robot-framework flake input

on:
  schedule:
    # 06:00 EET (UTC+2)
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-robot-framework:
    name: Update robot-framework input
    # Skip running in forked repositories; this job needs AUTOMATION_TOKEN.
    if: ${{ github.repository == 'tiiuae/ghaf-infra' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # Only required for checkout; branch/PR writes use AUTOMATION_TOKEN.
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b

      - name: Update robot-framework flake input
        shell: bash
        run: nix flake lock --update-input robot-framework

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.AUTOMATION_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: automation/update-robot-framework
          add-paths: flake.lock
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: |
            flake.lock: Update robot-framework input

            Automated update of the robot-framework flake input.
          signoff: true
          title: "flake.lock: Update robot-framework input"
          body: |
            This PR updates the `robot-framework` flake input in `flake.lock`.

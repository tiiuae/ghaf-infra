name: Build and test

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  # Manual trigger. Lets maintainers run the workflow against any ref, which
  # is useful for exercising workflow changes before merge (e.g. via
  # `gh workflow run test-ghaf-infra.yml --ref <branch>`). GitHub only exposes
  # workflow_dispatch once the trigger exists on the default branch, so this
  # change itself must land on main before it can be used that way.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authorize:
    # Important: 'authorize' must run before checkout to ensure 'authorize.yml'
    # runs the base version, not the untrusted version from the PR.
    uses: ./.github/workflows/authorize.yml
    # Skip running in forked repositories, since the workflow run would fail
    # due to missing repository secret(s):
    if: ${{ github.repository == 'tiiuae/ghaf-infra' }}
    with:
      github-org: tiiuae
    secrets:
      read-org-members: ${{ secrets.READ_ORG_MEMBERS }}
  build_matrix:
    name: "build"
    needs: [authorize]
    if: needs.authorize.outputs.result == 'authorized'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
          - arch: aarch64-linux
    concurrency:
      # Cancel any in-progress workflow runs from the same PR or branch,
      # allowing matrix jobs to run concurrently:
      group: ${{ github.workflow }}.${{ github.event.pull_request.number || github.ref }}.${{ matrix.arch }}
      cancel-in-progress: true
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit
      - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: |
            ${{ secrets.BUILDER_SSH_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b
      - name: Add builders to ssh_known_hosts
        shell: bash
        run: |
          sudo sh -c "echo '${BUILDER_SSH_KNOWN_HOST}' >>/etc/ssh/ssh_known_hosts"
        env:
          BUILDER_SSH_KNOWN_HOST: '${{ vars.BUILDER_SSH_KNOWN_HOST }}'
      - name: Build ${{ matrix.arch }}
        shell: bash
        run: |
          # Derive the per-arch host list from flake.lib.hostsBySystem so the
          # filter stays in sync with the canonical inventory (no name-based
          # heuristics).
          HOSTS=$(nix eval --raw \
            ".#lib.hostsBySystem.${{ matrix.arch }}" \
            --apply 'names: builtins.concatStringsSep "|" names')
          if [ "${{ matrix.arch }}" == "x86_64-linux" ]; then
            BUILDER="${BUILDER_X86}"
            # x86 targets: all x86_64-linux nixosConfigurations, devShell, pre-commit checks
            FILTER="(^nixosConfigurations\\.(${HOSTS})\\.|^devShells\\.x86_64-linux\\..*$|x86_64-linux\\.pre-commit)"
          elif [ "${{ matrix.arch }}" == "aarch64-linux" ]; then
            BUILDER="${BUILDER_AARCH}"
            # aarch64 targets: aarch64-linux nixosConfigurations
            FILTER="^nixosConfigurations\\.(${HOSTS})\\."
          else
            echo "::error::Unknown architecture: '${{ matrix.arch }}'"
            exit 1
          fi
          OPTS="--remote $BUILDER --no-download --skip-cached --option accept-flake-config true"
          # Build arch-specific targets based on FILTER
          ./scripts/nix-fast-build.sh -f "$FILTER" -o "$OPTS"
        env:
          BUILDER_X86: ${{ vars.BUILDER_X86 }}
          BUILDER_AARCH: ${{ vars.BUILDER_AARCH }}

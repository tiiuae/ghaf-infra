version: '2.0'
signature:
  verify: true

criteria:
  - id: predicate-type-slsa-provenance-v1
    description: Provenance predicate type is SLSA Provenance v1
    required: true
    cel: predicateType == 'https://slsa.dev/provenance/v1'

  - id: build-type-ghaf-jenkins
    description: Provenance build type is the Ghaf Jenkins Nix build type
    required: true
    cel: predicate.buildDefinition.buildType == 'https://github.com/tiiuae/ghaf-infra/blob/ea938e90/slsa/v1.0/L1/buildtype.md'

  - id: target-repo-ghaf
    description: Target repository is tiiuae/ghaf
    required: true
    cel: predicate.buildDefinition.externalParameters.target.repository == 'https://github.com/tiiuae/ghaf/'

  - id: built-recently
    description: Build was finished less than 6 hours ago
    required: true
    cel: now - timestamp(predicate.runDetails.metadata.finishedOn) < duration('6h')

  - id: builder-id-hetzner
    description: Built on Hetzner CI dbg, dev, prod, release or UAE Azure CI dev, prod, release
    required: true
    cel: |
      predicate.runDetails.builder.id in [
        'https://ci-dbg.vedenemo.dev/',
        'https://ci-dev.vedenemo.dev/',
        'https://ci-prod.vedenemo.dev/',
        'https://ci-release.vedenemo.dev/',
        'https://ci-prod.uaenorth.cloudapp.azure.com/',
        'https://ci-dev.uaenorth.cloudapp.azure.com/',
        'https://ci-release.uaenorth.cloudapp.azure.com/'
      ]
